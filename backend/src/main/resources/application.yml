server:
  port: ${PORT:8080}

spring:
  config:
    import: optional:file:../.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/aptis_fullstack_no_renewal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:demo123}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:3}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:0123456789012345678901234567890123456789012345678901234567890123}
    access-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-days: ${JWT_REFRESH_DAYS:14}

  upload-dir: ${UPLOAD_DIR:uploads}
  cors: ${APP_CORS:http://localhost:5173}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
